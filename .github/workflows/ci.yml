name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci || npm install

    - name: Run ESLint (Lint Check)
      run: npm run lint

    - name: Run Unit Tests
      run: npm run test

    - name: Run Production Build
      run: npm run build
